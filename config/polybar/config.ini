include-file = $HOME/.config/polybar/modules.ini
include-file = $HOME/.config/polybar/custom_modules.ini

[color]

bg = #1F1F1F
fg = #FFFFFF
fg-alt = #A9ABB0

acolor = #00897b
curgent = #e53935
coccupied = #1e88e5

## Material Colors

red = #e53935
pink = #d81b60
purple = #8e24aa
deep-purple = #5e35b1
indigo = #3949ab
blue = #1e88e5
light-blue = #039be5
cyan = #00acc1
teal = #00897b
green = #43a047
light-green = #7cb342
lime = #c0ca33
yellow = #fdd835
amber = #ffb300
orange = #fb8c00
deep-orange = #f4511e
brown = #6d4c41
grey = #757575
blue-gray = #546e7a

;==========================================================

[bar/main]
monitor = ${env:MONITOR}
width = 100%
height = 22
;offset-x = 5%
;offset-y = 2%
bottom = false
fixed-center = true
line-size = 1

background = ${color.bg}
foreground = ${color.fg}

border-size = 3
border-color = ${color.bg}

module-margin-left = 1
module-margin-right = 1

;==========================================================

;font-0 = "Fantasque Sans Mono:pixelsize=10;2"
font-0 = "Ubuntu Condensed:size=10;2"
font-1 = "Material Icons:size=11;4"

;==========================================================

cursor-click = pointer

;tray-position = right
;tray-padding = 0
;tray-maxsize = 16
enable-ipc = true

scroll-up = i3wm-wsnext
scroll-down = i3wm-wsprev

;== Module Location ========================================================

modules-left = menu workspaces term files browser spotify
modules-center = skip_previous music skip_next
modules-right = cpu memory filesystem temperature volume battery eth wifi date powermenu

;== EOF ========================================================
